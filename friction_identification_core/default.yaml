# 默认硬件辨识配置。
# 下面的注释主要说明运行约束和调参方向，不改动当前参数取值。

# 电机拓扑与本次运行启用列表。
# `ids` / `names` 需要一一对应，`enabled` 必须是 `ids` 的子集。
motors:
  ids: [1, 2, 3, 4, 5, 6, 7]
  names:
    - "motor_01"
    - "motor_02"
    - "motor_03"
    - "motor_04"
    - "motor_05"
    - "motor_06"
    - "motor_07"
  # 默认只辨识 1~4 号电机；5~7 号仍保留反馈接收，但不进入辨识/下发轮次。
  enabled: [1, 2, 3, 4]

# 串口采集与起始同步配置。
# 正式采集前，需要先连续收到目标电机若干帧合法反馈。
serial:
  port: "/dev/ttyUSB0"
  baudrate: 115200
  read_timeout: 0.02
  write_timeout: 0.02
  read_chunk_size: 256
  # 每轮开始前清空残留输入，避免上一轮旧帧污染本轮同步。
  flush_input_before_round: true
  sync_timeout: 2.0
  sync_cycles_required: 3

# 固定使用零中心 `multisine` 位置激励。
# 单轮相位顺序为：hold_start -> fade_in -> excitation_cycle_* -> fade_out -> hold_end。
excitation:
  sample_rate: 200.0
  # 当前实现只支持 `multisine`，不要改成别的字符串。
  curve_type: "multisine"
  hold_start: 1.0
  hold_end: 1.0
  position_limit: 2.5
  # 轨迹速度峰值会被限制在 `velocity_utilization * control.max_velocity` 以内。
  velocity_utilization: 1
  # 基频越低，单个激励周期越长，总采集时长也会随之增加。
  base_frequency: 0.20
  steady_cycles: 6
  # 当前默认值对应约 10s 的平滑起坡 / 落坡，减少过快的上下变化。
  fade_in_cycles: 2
  fade_out_cycles: 2
  # 频率成分与相对权重需一一对应；运行时会用 Schroeder 相位降低峰值因子。
  harmonic_multipliers: [1, 2, 3, 4, 5, 6]
  harmonic_weights: [1.0, 0.75, 0.55, 0.40, 0.30, 0.25]

# 控制器增益、归零判定和运行期保护阈值。
# 这些参数既支持标量广播，也支持按电机 ID 顺序提供数组。
control:
  # 参考轨迹使用的基础速度上限，真正峰值还会再乘 `velocity_utilization`。
  max_velocity: 1.0
  max_torque: [40.0, 40.0, 27.0, 27.0, 7.0, 7.0, 9.0]
  # `identify` 正式采集阶段使用的基础 PD 位置/速度反馈增益。
  # `compensate` 当前只复用已辨识出的前馈参数，不走这组绝对式 PD。
  # 顺序按 motor id 1..7 展开；当前按 [1,2] / [3,4] / [5,6,7] 三组填写。
  position_gain: [1, 4, 4, 4, 0.05, 0.05, 0.05]
  velocity_gain: [0.5, 2, 2, 2, 0.025, 0.025, 0.025]
  # `identify` 的预归零阶段同样按 [1,2] / [3,4] / [5,6,7] 三组填写。
  zeroing_position_gain: [4, 4, 4, 4, 0.4, 0.3, 0.3]
  zeroing_velocity_gain: [2, 2, 2, 2, 0.2, 0.14, 0.14]
  # 预归零阶段的硬速度保护阈值；超过它会直接触发 abort。
  zeroing_hard_velocity_limit: 2.0
  # 这个阈值只用于判断是否进入 0 点附近的最终锁定窗口。
  zeroing_velocity_limit: 0.40
  zeroing_position_tolerance: 0.2
  zeroing_velocity_tolerance: 0.02
  zeroing_required_frames: 8
  zeroing_timeout: 8.0
  # 运行中速度保护阈值为：
  # max(low_speed_abort_limit, speed_abort_ratio * |当前相位理论速度|)。
  speed_abort_ratio: 1.20
  # 理论速度低于该阈值时，不再强制按速度方向匹配参考点，减少零速附近误判。
  zero_target_velocity_threshold: 0.02
  # 即使理论速度很小，也至少保留这一条绝对速度保护下限。
  low_speed_abort_limit: 0.08

# 静态摩擦辨识与质量门限。
# 当前静态模型近似为：tau = coulomb * tanh(v / scale) + viscous * v + offset。
identification:
  # 默认分组数，可被命令行 `--groups` 覆盖。
  group_count: 1
  regularization: 1.0e-6
  huber_delta: 1.5
  # 拟合前的最小样本门槛：总样本数以及正反方向样本数。
  max_iterations: 12
  min_samples: 200
  min_direction_samples: 300
  # 低于零速阈值的点会被视为接近静止；运动跨度太小的数据也会被判为不可靠。
  zero_velocity_threshold: 0.015
  min_motion_span: 0.05
  # 采样质量门限：目标电机有效帧比例过低或序列错误比例过高时，本轮会被拒绝。
  min_target_frame_ratio: 0.7
  max_sequence_error_ratio: 0.2
  # 按 `max_velocity` 的比例划分验证速度带，用于速度分带 holdout 评估。
  validation_velocity_band_edges_ratio: [0.05, 0.12, 0.25, 0.40, 0.60, 0.85]
  validation_warmup_samples: 20
  # Savitzky-Golay 速度平滑参数；窗口长度会在运行时自动修正为合法奇数。
  savgol_window: 31
  savgol_polyorder: 3
  # `tanh(v / scale)` 的初始候选尺度；运行时还会结合数据动态补充候选值。
  velocity_scale_candidates: [0.01, 0.02, 0.05]

# 输出目录与汇总文件命名。
# `results_dir` 如果填相对路径，会按项目根目录解析。
output:
  results_dir: "results"
  summary_filename: "hardware_identification_summary.npz"
  summary_csv_filename: "hardware_identification_summary.csv"
  summary_report_filename: "hardware_identification_summary.md"
