# 电机基础配置。
# `ids` / `names` 必须一一对应，`enabled` 必须是 `ids` 的子集。
motors:
  # 总线上实际存在的电机 ID；配置解析时要求为连续递增序列。
  ids: [1, 2, 3, 4, 5, 6, 7]
  # 与 `ids` 按顺序一一对应的人类可读名称。
  names:
    - "motor_01"
    - "motor_02"
    - "motor_03"
    - "motor_04"
    - "motor_05"
    - "motor_06"
    - "motor_07"
  # 本次运行启用哪些电机；可用于只跑部分关节而不改完整拓扑。
  enabled: [1, 2, 3, 4, 5, 6, 7]

# 串口采集与起始同步配置。
serial:
  # USB 串口设备路径。
  port: "/dev/ttyUSB0"
  # 串口波特率，需要与下位机设置一致。
  baudrate: 115200
  # 单次读超时，单位秒。
  read_timeout: 0.02
  # 单次写超时，单位秒。
  write_timeout: 0.02
  # 每次底层读取的最大字节数；解析器会自动拼接完整帧。
  read_chunk_size: 256
  # 每轮采集前先清空输入缓冲，避免上一轮残留数据污染同步。
  flush_input_before_round: true
  # 开始正式采集前，等待同步成功的最长时间，单位秒。
  sync_timeout: 2.0
  # 进入正式采集前，目标电机至少需要命中这么多次合法反馈帧。
  sync_cycles_required: 3

# 激励轨迹配置。
# 单轮过程固定为：
# hold_start -> 正向平台 -> transition_mid_zero -> 反向平台 -> transition_end_zero -> hold_end。
excitation:
  # 参考轨迹采样率，单位 Hz。
  sample_rate: 200.0
  # 运动开始前的零速保持时间，给系统留出稳定与同步缓冲。
  hold_start: 1.0
  # 运动结束后的零速保持时间，便于收尾与记录末段数据。
  hold_end: 1.0
  # 正反向平台之间，以及反向结束回零时使用的统一过渡时间，单位秒。
  transition_duration: 0.35
  # 显式定义每个速度平台，按列表顺序依次执行。
  # 每个平台都会经历“加速进入该档位 -> 等待瞬态衰减 -> 稳态采样”三个阶段，
  # 然后在 `transition_duration` 内回到零速或切到下一段反向轨迹。
  # `speed_ratio` 会在运行时换算成 `speed_ratio * max_velocity`，因此这里填的是相对比例而不是绝对速度。
  # 一般来说，低速档更有助于观察库仑摩擦和死区，高速档更有助于分离黏性摩擦项。
  platforms:
    # 第 1 档：低速试探段，优先覆盖起步附近的摩擦特性。
    - speed_ratio: 0.12
      # 到达目标速度后先留一小段稳定时间，避开加减速瞬态。
      settle_duration: 1.00
      # 真正用于稳态统计与参数拟合的数据窗口长度。
      steady_duration: 2.50
    # 第 2 档：低中速段，在保证稳定性的同时增加速度覆盖范围。
    - speed_ratio: 0.28
      settle_duration: 1.50
      steady_duration: 3.00
    # 第 3 档：中速段，通常是兼顾信噪比和时长的主力平台。
    - speed_ratio: 0.50
      settle_duration: 2.00
      steady_duration: 3.50
    # 第 4 档：中高速段，帮助区分速度相关项并观察更明显的黏性趋势。
    - speed_ratio: 0.72
      settle_duration: 3.00
      steady_duration: 4.50
    # 第 5 档：接近上限的高速段，用于补足高速度区间信息。
    # 由于速度更高、系统瞬态更明显，通常需要更长的稳定和采样时间。
    - speed_ratio: 0.90
      settle_duration: 5.00
      steady_duration: 5.00

# 控制器限幅。
control:
  # 速度误差映射到扭矩命令时的归一化上限；标量会广播到所有电机。
  max_velocity: 5.0
  # 每个电机的扭矩限幅；列表长度需与电机数量一致。
  max_torque: [40.0, 40.0, 27.0, 27.0, 7.0, 7.0, 9.0]

# 摩擦辨识配置。
# 当前模型形式近似为：tau = coulomb * tanh(v / scale) + viscous * v + offset。
identification:
  # 默认分组数；可被命令行 `--groups` 覆盖。
  group_count: 1
  # Ridge 正则系数，防止求解病态或过拟合。
  regularization: 1.0e-6
  # Huber 鲁棒权重阈值；越小越容易压低离群点影响。
  huber_delta: 1.5
  # IRLS 鲁棒回归的最大迭代次数。
  max_iterations: 12
  # 至少需要这么多有效稳态样本才会执行辨识。
  min_samples: 200
  # 每个稳态平台在过滤后至少要保留的样本数。
  min_samples_per_platform: 120
  # 正向与反向样本各自至少要达到的样本数。
  min_direction_samples: 300
  # 小于该速度阈值时视为接近静止，不参与有效稳态样本筛选。
  zero_velocity_threshold: 0.015
  # 有效样本的最小位置跨度；太小说明运动不足，结果不可靠。
  min_motion_span: 0.05
  # 目标电机有效帧占整轮采样的最低比例，低于此值会判定采样不足。
  min_target_frame_ratio: 0.7
  # 允许的最大序列错误比例，过高会直接放弃该轮数据。
  # 兼容保留字段：当前版本不再依赖总线顺序做同步或判废。
  max_sequence_error_ratio: 0.2
  # 预留给验证抽样策略的步长参数；当前版本已解析，但未进入主流程。
  validation_stride: 5
  # 预留给验证阶段的预热样本数；当前版本已解析，但未进入主流程。
  validation_warmup_samples: 20
  # Savitzky-Golay 速度平滑窗口长度；代码里会自动修正为合法奇数窗口。
  savgol_window: 31
  # Savitzky-Golay 平滑多项式阶数。
  savgol_polyorder: 3
  # `tanh(v / scale)` 的初始候选尺度，运行时还会结合数据动态补充候选值。
  velocity_scale_candidates: [0.01, 0.02, 0.05]

# 输出文件与汇总命名配置。
output:
  # 结果根目录；相对路径会按项目根目录解析。
  results_dir: "results"
  # 二进制汇总文件名（NumPy `.npz`）。
  summary_filename: "hardware_identification_summary.npz"
  # 表格汇总文件名（CSV）。
  summary_csv_filename: "hardware_identification_summary.csv"
  # Markdown 汇总报告文件名。
  summary_report_filename: "hardware_identification_report.md"
